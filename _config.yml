title: HealthyLifeHub
description: "Your trusted source for health, wellness, and nutrition tips to live your best life."
url: "https://kkumakkuma.github.io"
baseurl: "/HealthyLifeHub"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: HealthyLifeHub
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-M9LLXP3P5V"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
